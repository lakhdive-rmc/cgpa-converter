<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CGPA to Percentage Converter | PDEA's Prof. Ramkrishna More College((Autonomous), Akurdi, Pune-44</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

    <h1>CGPA to Percentage Converter</h1>

    <h2>
        PDEA's Prof. Ramkrishna More College (Autonomous), Akurdi, Pune-44
    </h2>

    <label>Select Grade</label>

    <select id="grade">
        <option value="">-- Select Grade --</option>
        <option value="O">O</option>
        <option value="A+">A+</option>
        <option value="A">A</option>
        <option value="B+">B+</option>
        <option value="B">B</option>
        <option value="C">C</option>
        <option value="D">D</option>
    </select>

    <label>Enter CGPA</label>

    <input type="number"
           id="cgpa"
           min="0"
           max="10"
           step="0.01"
           placeholder="Example: 8.50">

    <button id="calculateBtn">
        Calculate Percentage
    </button>

    <button id="resetBtn">
        Reset
    </button>

    <div id="result">
        Result will appear here
    </div>

</div>

<script src="app.js"></script>

</body>
</html>
